<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Invitation</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #333;
        }

        /* पीछे वाला Blur बैकग्राउंड */
        .bg-blur {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('card.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(15px); /* यहाँ से आप Blur कम या ज्यादा कर सकते हैं */
            transform: scale(1.1);
        }

        /* सामने वाला मुख्य कार्ड */
        .card-img {
            position: relative;
            max-width: 90%;
            max-height: 90vh;
            width: auto;
            height: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 10px;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="bg-blur"></div>
    <img src="card.jpg" class="card-img" alt="Wedding Invitation">

</body>
</html>
